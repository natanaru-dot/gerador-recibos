<html>
    <head>
        <title>Gerador de Recibos</title>

        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>


<h1>Gerador de Recibos</h1>

<div id="container">

<div id="painel">

<input type="text" id="nome" placeholder="Nome do cliente">

<input type="number" id="valor" placeholder="Valor">

<input type="text" id="servico" placeholder="Serviço">

<input type="date" id="data">

<input type="text" id="buscar" placeholder="Buscar cliente">

<button id="pesquisar">Buscar</button>

<button id="gerar">
    Gerar Recibo
</button>

<button id="imprimir">
    Imprimir
</button>

<button id="limparHistorico"> Limpar historico</button>

<button id="mostrarTodos">Mostrar Todos</button>

<button id="exportar">Exportar Histórico</button>

</div>

<div id="estatisticas">

    <h2> Estatísticas</h2>

    <p id="totalRecibos">Total de recibos: 0</p>

    <p id="valorTotal">Valor recebido: R$ 0,00</p>
    
</div>

<div id="conteudo">

    <div id="historico">
       <h2>Últimos Recibos</h2> 

    </div>

<div id="recibo"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
