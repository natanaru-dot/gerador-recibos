<html>
    <head>
        <title>Gerador de Recibos</title>

        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>


<h1>Gerador de Recibos</h1>

<input type="text" id="nome" placeholder="Nome do cliente">

<input type="number" id="valor" placeholder="Valor">

<input type="text" id="servico" placeholder="Serviço">

<input type="date" id="data">

<input type="text" id="buscar" placeholder="Buscar cliente">

<button id="pesquisar">Buscar</button>

<button id="gerar">
    Gerar Recibo
</button>

<button id="imprimir">
    Imprimir
</button>

<button id="limparHistorico"> Limpar historico</button>

<div id="recibo"></div>

<div id="historico">
     <h2>Últimos Recibos</h2> 

</div>

<script src="script.js"></script>

</body>

</html>
